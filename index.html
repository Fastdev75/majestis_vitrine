  <style>
    .site-footer {
      position: relative;
      z-index: 5;
      margin-top: 60px;
      background: #08111c;
      border-top: 1px solid rgba(217,184,106,0.22);
      padding: 48px 32px 56px;
      font-family: 'Jost', sans-serif;
      color: rgba(244,237,224,0.7);
    }
    .site-footer::before {
      content: ""; position: absolute; top: -1px; left: 0; right: 0; height: 1px;
      background: linear-gradient(to right, transparent 0%, rgba(217,184,106,0.55) 50%, transparent 100%);
    }
    .footer-inner {
      max-width: 1480px; margin: 0 auto;
      display: flex; flex-direction: column; align-items: center; gap: 18px;
      text-align: center;
    }
    .footer-social { display: inline-flex; gap: 14px; }
    .footer-social a {
      width: 38px; height: 38px;
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid rgba(217,184,106,0.4);
      border-radius: 50%;
      color: #d9b86a;
      text-decoration: none;
      transition: background .25s ease, color .25s ease, transform .25s ease, border-color .25s ease;
    }
    .footer-social a:hover {
      background: #d9b86a; color: #08111c;
      border-color: #d9b86a; transform: translateY(-2px);
    }
    .footer-social svg { width: 14px; height: 14px; fill: currentColor; }
    .footer-copy {
      font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(244,237,224,0.55);
    }
    .footer-copy span { color: #d9b86a; font-weight: 500; letter-spacing: 0.32em; }
    .footer-menu {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 8px 28px;
      font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;
    }
    .footer-menu a {
      color: rgba(244,237,224,0.55);
      text-decoration: none;
      transition: color .25s ease;
    }
    .footer-menu a:hover { color: #e8d3a0; }

    .back-to-top {
      position: fixed; right: 22px; bottom: 32px;
      width: 44px; height: 44px;
      background: rgba(8,11,22,0.78);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(217,184,106,0.45);
      border-radius: 50%;
      color: #d9b86a; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transform: translateY(6px);
      transition: opacity .3s ease, transform .3s ease, background .25s ease, color .25s ease;
    }
    .back-to-top.is-visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .back-to-top:hover { background: #d9b86a; color: #08111c; }
    .back-to-top svg { width: 14px; height: 14px; fill: currentColor; }

    @media (max-width: 600px) {
      .site-footer { padding: 36px 18px 44px; margin-top: 40px; }
      .footer-menu { gap: 6px 18px; font-size: 9.5px; }
      .back-to-top { right: 14px; bottom: 24px; width: 40px; height: 40px; }
    }
  </style>

  <script>
    (function() {
      const btt = document.querySelector('.back-to-top');

      const onScroll = () => btt.classList.toggle('is-visible', window.scrollY > 320);
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
